name: TrueNAS Catalog Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      bump:
        description: "Catalog-Versions-Bump"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

concurrency:
  group: truenas-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Oikos
        uses: actions/checkout@v4
        with:
          ref: main          # nicht den Tag-Commit (detached HEAD) — sonst kein sauberer Push auf main
          fetch-depth: 0

      - name: Checkout TrueNAS fork
        uses: actions/checkout@v4
        with:
          repository: ulsklyc/apps
          ref: master          # community/oikos wird unten frisch aus upstream gebaut (nach Merge gelöscht)
          token: ${{ secrets.TRUENAS_FORK_TOKEN }}
          path: truenas-apps
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare community/oikos branch from upstream
        working-directory: truenas-apps
        run: |
          git remote add upstream https://github.com/truenas/apps.git
          git fetch upstream master --depth=1
          git checkout -B community/oikos upstream/master

      - name: Generate TrueNAS files
        id: gen
        env:
          BUMP_INPUT: ${{ github.event.inputs.bump }}
        run: |
          BUMP="${BUMP_INPUT:-patch}"
          node tools/truenas/generate.mjs --bump="$BUMP" \
            --out "$GITHUB_WORKSPACE/truenas-apps/ix-dev/community/oikos"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "catalog=$(node -p "require('./deploy/truenas/catalog-version.json').version")" >> "$GITHUB_OUTPUT"

      - name: Push fork branch
        id: push
        working-directory: truenas-apps
        env:
          VERSION: ${{ steps.gen.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ix-dev/community/oikos
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Keine Änderungen — nichts zu veröffentlichen."
            exit 0
          fi
          git commit -m "fix(oikos): bump to v$VERSION"
          git push --force origin community/oikos   # Branch wird pro Lauf frisch aus upstream gebaut
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit catalog-version.json back to Oikos
        if: steps.push.outputs.changed == 'true'
        env:
          CATALOG: ${{ steps.gen.outputs.catalog }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- deploy/truenas/catalog-version.json; then
            git add deploy/truenas/catalog-version.json
            git commit -m "chore(truenas): bump catalog version to $CATALOG [skip ci]"
            git push origin HEAD:main
          fi

